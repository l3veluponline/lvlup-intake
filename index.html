<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LVLUP — Program Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/glacial-indifference" rel="stylesheet">
<style>
  :root {
    /* Brand colours — LVLUP */
    --black: #010101;
    --bg: #0A0A08;
    --bg-2: #131312;
    --bg-3: #1A1A18;
    --white: #FFFFFF;
    --ink: #FFFFFF;
    --ink-dim: #9A9A92;
    --ink-faint: #4A4A44;
    --cyan: #3BC5E9;
    --cyan-hover: #5DD0ED;
    --blue: #29AAE1;
    --blue-deep: #1B748B;
    --line: #222220;
    --line-2: #2E2E2A;
    --err: #FF6B4A;

    /* Typography */
    --display: 'League Spartan', 'Manrope', system-ui, sans-serif;
    --body: 'Glacial Indifference', 'Manrope', system-ui, sans-serif;
    --mono: 'League Spartan', 'Manrope', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);
    font-weight: 400;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(59, 197, 233, 0.06), transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(27, 116, 139, 0.05), transparent 60%);
  }

  .app {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    background: var(--black);
    border-right: 1px solid var(--line);
    padding: 36px 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .brand-block { display: flex; align-items: center; }

  .brand-logo {
    width: 200px;
    height: auto;
    display: block;
    /* JPEG source has solid black background — blend mode makes it disappear
       against the dark sidebar, simulating transparency */
    mix-blend-mode: lighten;
  }

  .brand-sub {
    font-family: var(--display);
    font-weight: 500;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 24px;
  }

  .progress-block { margin-top: 44px; }
  .progress-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .progress-track {
    width: 100%;
    height: 2px;
    background: var(--line);
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--cyan);
    width: 0%;
    transition: width 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 0 10px rgba(59, 197, 233, 0.4);
  }
  .progress-count {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    color: var(--ink-dim);
    margin-top: 16px;
    letter-spacing: 0.05em;
  }
  .progress-count .current { color: var(--cyan); font-size: 16px; }
  .progress-count .total { color: var(--ink-faint); }

  .section-map {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .section-item {
    font-family: var(--display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: color 240ms ease;
  }
  .section-item.active { color: var(--cyan); }
  .section-item.done { color: var(--ink-dim); }
  .section-dot {
    width: 6px; height: 6px;
    background: currentColor;
    flex-shrink: 0;
  }

  .footer {
    font-family: var(--display);
    font-weight: 500;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    line-height: 1.8;
  }
  .footer kbd {
    font-family: var(--display);
    font-weight: 700;
    color: var(--ink-dim);
    padding: 2px 6px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    font-size: 10px;
    margin: 0 2px;
  }

  /* ─── Main ─── */
  .main {
    position: relative;
    overflow-y: auto;
    padding: 72px 88px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;
  }

  .question-wrap {
    max-width: 680px;
    width: 100%;
    opacity: 0;
    transform: translateY(14px);
    animation: enter 520ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes enter { to { opacity: 1; transform: translateY(0); } }
  @keyframes exit { to { opacity: 0; transform: translateY(-14px); } }
  .question-wrap.leaving { animation: exit 220ms cubic-bezier(0.4, 0, 1, 1) forwards; }

  /* Question number bar */
  .q-number-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .q-number {
    font-family: var(--display);
    font-weight: 800;
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 0.1em;
  }
  .q-chevron {
    width: 14px;
    height: 14px;
    color: var(--ink-faint);
  }
  .q-section {
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .q-label {
    font-family: var(--display);
    font-size: 42px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    color: var(--white);
  }
  .q-label .accent { color: var(--cyan); }
  .q-required {
    display: inline-block;
    color: var(--cyan);
    margin-left: 4px;
    font-weight: 400;
  }
  .q-help {
    font-size: 15px;
    color: var(--ink-dim);
    margin-bottom: 36px;
    max-width: 540px;
    line-height: 1.55;
  }

  /* ─── Inputs ─── */
  input[type="text"], input[type="email"], input[type="tel"], input[type="number"], textarea {
    width: 100%;
    font-family: var(--display);
    font-size: 26px;
    font-weight: 500;
    color: var(--white);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line-2);
    padding: 12px 0;
    outline: none;
    transition: border-color 200ms ease;
    letter-spacing: -0.01em;
  }
  input:focus, textarea:focus {
    border-bottom-color: var(--cyan);
  }
  input::placeholder, textarea::placeholder {
    color: var(--ink-faint);
    font-weight: 400;
    font-style: italic;
  }
  textarea {
    resize: none;
    height: 120px;
    font-size: 17px;
    font-family: var(--body);
    line-height: 1.5;
    font-weight: 400;
  }
  .textarea-hint {
    font-family: var(--display);
    font-weight: 600;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* Select tiles */
  .tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
  }
  .tile {
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    color: var(--ink);
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 180ms ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    letter-spacing: 0.01em;
  }
  .tile:hover {
    border-color: var(--cyan);
    background: var(--bg-3);
  }
  .tile.selected {
    border-color: var(--cyan);
    background: rgba(59, 197, 233, 0.1);
    color: var(--white);
    box-shadow: inset 0 0 0 1px var(--cyan);
  }
  .tile-key {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--ink-faint);
    padding: 3px 7px;
    border: 1px solid var(--line-2);
    letter-spacing: 0.05em;
  }
  .tile.selected .tile-key {
    color: var(--cyan);
    border-color: var(--cyan);
  }

  .multi-hint {
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Weekday row */
  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .weekday {
    aspect-ratio: 1;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    color: var(--ink-dim);
    font-family: var(--display);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 160ms ease;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .weekday:hover { border-color: var(--cyan); color: var(--white); }
  .weekday.selected {
    background: var(--cyan);
    border-color: var(--cyan);
    color: var(--black);
  }

  /* Slider */
  .slider-wrap { padding: 14px 0 0; }
  .slider-value {
    font-family: var(--display);
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 22px;
    color: var(--white);
  }
  .slider-value span.unit {
    font-family: var(--display);
    font-weight: 500;
    font-size: 14px;
    color: var(--ink-dim);
    margin-left: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line-2);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: var(--cyan);
    cursor: pointer;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(59, 197, 233, 0.2);
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px;
    background: var(--cyan);
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    color: var(--ink-faint);
    margin-top: 12px;
    letter-spacing: 0.1em;
  }

  /* Lift inputs */
  .lift-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 22px 24px;
  }
  .lift-field label {
    display: block;
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .lift-field input {
    font-size: 22px;
    font-family: var(--display);
    font-weight: 600;
  }

  /* File upload */
  .file-drop {
    display: block;
    border: 1px dashed var(--line-2);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 200ms ease;
    font-family: var(--display);
    font-weight: 600;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--bg-2);
  }
  .file-drop:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: var(--bg-3);
  }
  .file-drop strong {
    display: block;
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    text-transform: none;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .file-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .file-item {
    font-family: var(--display);
    font-weight: 500;
    font-size: 12px;
    color: var(--ink-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--bg-2);
    border-left: 2px solid var(--cyan);
    letter-spacing: 0.02em;
  }
  .file-item .rm {
    color: var(--err);
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 44px;
  }
  .btn {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    padding: 16px 32px;
    border: none;
    cursor: pointer;
    transition: all 180ms ease;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .btn-primary {
    background: var(--cyan);
    color: var(--black);
    box-shadow: 0 4px 20px rgba(59, 197, 233, 0.15);
  }
  .btn-primary:hover {
    background: var(--cyan-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(59, 197, 233, 0.25);
  }
  .btn-primary:disabled {
    background: var(--line);
    color: var(--ink-faint);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-dim);
    padding: 16px 10px;
  }
  .btn-ghost:hover { color: var(--cyan); }
  .btn-chevron {
    width: 14px;
    height: 14px;
    display: inline-block;
  }
  .btn-key {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    padding: 3px 7px;
    background: rgba(0,0,0,0.25);
    letter-spacing: 0.1em;
  }

  .err-msg {
    color: var(--err);
    font-size: 13px;
    margin-top: 16px;
    font-family: var(--display);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .err-msg::before {
    content: '!';
    display: inline-flex;
    width: 18px; height: 18px;
    background: var(--err);
    color: var(--black);
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 12px;
  }

  /* Intro / end screens */
  .screen-centered { max-width: 720px; }

  .intro-eyebrow {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .intro-eyebrow::before {
    content: '';
    width: 32px;
    height: 2px;
    background: var(--cyan);
  }
  .intro-title {
    font-family: var(--display);
    font-size: 78px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 26px;
    color: var(--white);
  }
  .intro-title .accent { color: var(--cyan); }
  .intro-body {
    font-size: 17px;
    color: var(--ink-dim);
    max-width: 540px;
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .intro-meta {
    display: flex;
    gap: 40px;
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 52px;
    padding: 22px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .intro-meta strong {
    display: block;
    font-family: var(--display);
    font-size: 26px;
    font-weight: 800;
    color: var(--white);
    text-transform: none;
    letter-spacing: -0.01em;
    margin-top: 6px;
  }
  .intro-meta strong .unit {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-dim);
    margin-left: 4px;
  }

  /* End screen */
  .summary-box {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--cyan);
    padding: 26px;
    margin: 32px 0;
    max-height: 280px;
    overflow-y: auto;
  }
  .summary-box pre {
    font-family: var(--display);
    font-weight: 500;
    font-size: 12px;
    color: var(--ink-dim);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
  }

  /* Status pill */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 16px;
    border: 1px solid var(--line-2);
    margin-bottom: 28px;
  }
  .status-pill.pending { color: var(--ink-dim); }
  .status-pill.success { color: var(--cyan); border-color: var(--cyan); }
  .status-pill.error { color: var(--err); border-color: var(--err); }
  .status-dot {
    width: 8px; height: 8px;
    background: currentColor;
    border-radius: 50%;
  }
  .status-pill.pending .status-dot {
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  /* Photo request card */
  .photo-card {
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-top: 3px solid var(--cyan);
    padding: 32px;
    margin: 28px 0;
  }
  .photo-card-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .photo-card h3 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    color: var(--white);
  }
  .photo-card p {
    font-size: 15px;
    color: var(--ink-dim);
    line-height: 1.55;
    margin-bottom: 20px;
  }
  .contact-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }
  .contact-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 0;
  }
  .contact-row + .contact-row { border-top: 1px solid var(--line); }
  .contact-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .contact-value {
    font-family: var(--display);
    font-weight: 700;
    font-size: 17px;
    color: var(--white);
    letter-spacing: -0.01em;
    text-decoration: none;
  }
  .contact-value:hover { color: var(--cyan); }

  .integration-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-top: 24px;
  }
  .integration-row .btn { justify-content: center; font-size: 12px; }
  .btn-outline {
    background: transparent;
    color: var(--white);
    border: 1px solid var(--line-2);
  }
  .btn-outline:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .hint {
    font-family: var(--display);
    font-weight: 500;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 28px;
    letter-spacing: 0.08em;
    line-height: 1.9;
    text-transform: uppercase;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }
  .hint strong {
    color: var(--cyan);
    display: block;
    margin-bottom: 10px;
    font-weight: 800;
    letter-spacing: 0.2em;
  }
  .hint code {
    font-family: var(--display);
    color: var(--cyan);
    font-size: 11px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ═══════════════════════════════════════════════
     MOBILE — tablet breakpoint
     ═══════════════════════════════════════════════ */
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
    html, body { overflow: auto; height: auto; }

    /* Sidebar becomes a compact top bar */
    .sidebar {
      padding: 14px 20px;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-right: none;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .sidebar > div:first-child { flex: 1; display: flex; align-items: center; gap: 20px; }
    .sidebar > div:first-child > .brand-block { flex-shrink: 0; }

    .brand-logo { width: 130px; }
    .brand-sub, .section-map, .footer { display: none; }

    .progress-block {
      margin-top: 0;
      flex: 1;
      min-width: 0;
    }
    .progress-label { display: none; }
    .progress-count { margin-top: 8px; font-size: 11px; text-align: right; }

    /* Main content */
    .main {
      padding: 28px 22px 40px;
      justify-content: flex-start;
      min-height: auto;
    }
    .question-wrap { padding: 8px 0; }

    /* Typography scaling */
    .q-label { font-size: 26px; line-height: 1.1; }
    .intro-title { font-size: 44px; line-height: 1; }
    .q-help { font-size: 14px; margin-bottom: 26px; }
    .intro-body { font-size: 15px; }

    /* Inputs — 16px minimum prevents iOS auto-zoom */
    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="tel"] { font-size: 20px; padding: 10px 0; }
    textarea { font-size: 16px; height: 140px; }

    /* Tiles stack to single column, bigger tap targets */
    .tiles { grid-template-columns: 1fr; gap: 8px; }
    .tile {
      padding: 18px 18px;
      min-height: 52px;
      font-size: 15px;
    }

    /* Weekday row — bigger cells on mobile */
    .weekday-row { gap: 6px; }
    .weekday { font-size: 11px; }

    /* Slider — bigger numeric readout */
    .slider-value { font-size: 56px; }
    input[type="range"] { height: 4px; padding: 12px 0; }
    input[type="range"]::-webkit-slider-thumb { width: 26px; height: 26px; }
    input[type="range"]::-moz-range-thumb { width: 26px; height: 26px; }

    /* Lift grid — single column on mobile */
    .lift-grid { grid-template-columns: 1fr; gap: 18px; }
    .lift-field input { font-size: 20px; }

    /* Controls */
    .controls {
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
    }
    .btn {
      min-height: 52px;
      padding: 14px 24px;
      font-size: 13px;
    }
    .btn-primary { flex: 1; justify-content: center; min-width: 180px; }
    .btn-ghost { padding: 14px 16px; }
    .btn-key { display: none; }

    /* Intro meta — stacks nicely */
    .intro-meta {
      gap: 24px;
      flex-wrap: wrap;
      padding: 18px 0;
      margin-bottom: 32px;
    }
    .intro-meta strong { font-size: 22px; }

    /* Photo card */
    .photo-card { padding: 24px 20px; }
    .photo-card h3 { font-size: 24px; }

    /* Contact rows — stack label above value on narrow screens */
    .contact-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 16px 0;
    }
    .contact-value { font-size: 18px; }
  }

  /* ═══════════════════════════════════════════════
     SMALL PHONE — tight screens (iPhone SE, etc)
     ═══════════════════════════════════════════════ */
  @media (max-width: 420px) {
    .sidebar { padding: 12px 16px; gap: 12px; }
    .brand-logo { width: 110px; }
    .main { padding: 22px 18px 32px; }

    .q-label { font-size: 22px; }
    .intro-title { font-size: 34px; }

    .intro-meta { gap: 18px; }
    .intro-meta strong { font-size: 18px; }

    /* Tiles: even tighter padding */
    .tile { padding: 16px; font-size: 14px; }

    /* Weekday row still fits 7 across but smaller */
    .weekday { font-size: 10px; }

    .slider-value { font-size: 44px; }

    .photo-card { padding: 20px 16px; }
    .photo-card h3 { font-size: 20px; }

    .integration-row { grid-template-columns: 1fr; }
  }
</style>
</head>

  { id: 'sessionLength', section: 'context', type: 'select', label: 'How long is a typical session?', options: ['30 min', '45 min', '60 min', '75 min', '90+ min'], required: true },

  // Goals (MULTI-SELECT now)
  { id: 'primaryGoals', section: 'goals', type: 'multiselect', label: 'What are your main <span class="accent">goals</span>?', help: 'Pick as many as apply. Drag the most important ones to the top of your mind — I\'ll follow up if priorities need clarifying.', options: [
    'Build muscle',
    'Get stronger',
    'Lose body fat',
    'Improve athletic performance / sport',
    'General health & fitness',
    'Look better (aesthetics)',
    'Feel better (energy & mood)'
  ], required: true },
  { id: 'priorityAreas', section: 'goals', type: 'multiselect', label: 'Body parts you want to <span class="accent">focus on</span>?', help: 'Select all that apply. Skip if you\'re happy with balanced development.', options: ['Chest', 'Back', 'Shoulders', 'Arms', 'Quads', 'Hamstrings', 'Glutes', 'Calves', 'Core'] },

  // Gym
  { id: 'gym', section: 'equipment', type: 'text', label: 'Which gym do you train at?', help: 'Name and suburb so I can check what\'s available.', placeholder: 'e.g. Fitness First, South Yarra', required: true },

  // Preferences
  { id: 'currentLifts', section: 'performance', type: 'lifts', label: 'Rough current numbers — <span class="accent">only if you know them</span>.', help: 'Skip anything you\'re not sure of. This just gives me a quick benchmark for your strength and experience level — you\'ll log your own working weights in the program. Not for judgement.' },
  { id: 'loves', section: 'performance', type: 'textarea', label: 'Exercises you love or want included?', placeholder: 'e.g. Romanian deadlifts, incline dumbbell press, weighted dips...' },
  { id: 'hates', section: 'performance', type: 'textarea', label: 'Exercises you hate, can\'t do, or that <span class="accent">cause pain or feel off</span>?', placeholder: 'e.g. back squats hurt my left hip, overhead pressing feels bad on my shoulder...' },

  // Health
  { id: 'injuries', section: 'health', type: 'textarea', label: 'Any injuries, niggles, surgeries, or things your body <span class="accent">can\'t do comfortably</span>?', help: '"None" is a perfectly valid answer.', placeholder: 'Current issues, past injuries, or anything I should work around.', required: true },
  { id: 'cardio', section: 'health', type: 'textarea', label: 'Cardio, steps, or sport outside the gym?', placeholder: 'e.g. 10k steps daily, run twice a week, Muay Thai on weekends...' },
  { id: 'other', section: 'health', type: 'textarea', label: 'Anything else I should know?', placeholder: 'Sleep, work hours, travel, specific context... or leave blank.' }
];

/* ═══════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════ */
const state = { step: -1, answers: {} };

const main = document.getElementById('main');
const progressFill = document.getElementById('progressFill');
const qCurrent = document.getElementById('qCurrent');
const qTotal = document.getElementById('qTotal');
const sectionMap = document.getElementById('sectionMap');
qTotal.textContent = questions.length;

/* ─── SVG helpers ─── */
const chevron = (color = 'currentColor') => `<svg class="q-chevron" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="square"><path d="M5 8 L12 15 L19 8"/></svg>`;
const chevronRight = (color = 'currentColor') => `<svg class="btn-chevron" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="square"><path d="M8 5 L15 12 L8 19"/></svg>`;
const chevronUp = (color = 'currentColor') => `<svg class="btn-chevron" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="square"><path d="M5 14 L12 7 L19 14"/></svg>`;

/* ═══════════════════════════════════════════════════════
   RENDERERS
   ═══════════════════════════════════════════════════════ */

function renderSectionMap() {
  const currentQ = state.step >= 0 && state.step < questions.length ? questions[state.step] : null;
  const currentSectionIdx = currentQ
    ? sections.findIndex(s => s.id === currentQ.section)
    : (state.step >= questions.length ? sections.length : -1);
  sectionMap.innerHTML = sections.map((s, i) => {
    const cls = i < currentSectionIdx ? 'done' : i === currentSectionIdx ? 'active' : '';
    return `<div class="section-item ${cls}"><div class="section-dot"></div>${s.label}</div>`;
  }).join('');
}

function renderProgress() {
  const pct = state.step < 0 ? 0 : state.step >= questions.length ? 100 : (state.step / questions.length) * 100;
  progressFill.style.width = pct + '%';
  qCurrent.textContent = state.step < 0 ? '00' : String(Math.min(state.step + 1, questions.length)).padStart(2, '0');
}

function renderIntro() {
  main.innerHTML = `
    <div class="question-wrap screen-centered">
      <div class="intro-eyebrow">Program Intake</div>
      <h1 class="intro-title">Let's build<br>your <span class="accent">next program.</span></h1>
      <p class="intro-body">A quick brief so I can write a program that actually fits your gym, your schedule, and what your body will tolerate. One question at a time — hit Enter to move on.</p>
      <div class="intro-meta">
        <div>Questions<strong>${questions.length}</strong></div>
        <div>Time<strong>~5<span class="unit">min</span></strong></div>
        <div>Format<strong>One at a time</strong></div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" onclick="next()">Begin ${chevronRight('#010101')}<span class="btn-key">Enter</span></button>
      </div>
    </div>
  `;
}

function renderQuestion(q) {
  const n = String(state.step + 1).padStart(2, '0');
  const total = String(questions.length).padStart(2, '0');
  const requiredMark = q.required ? '<span class="q-required">*</span>' : '';
  const help = q.help ? `<div class="q-help">${q.help}</div>` : '';
  const sectionLabel = sections.find(s => s.id === q.section).label;

  let input = '';
  switch (q.type) {
    case 'text':
    case 'email':
    case 'tel':
      input = `<input type="${q.type}" id="fld" placeholder="${q.placeholder || ''}" value="${state.answers[q.id] || ''}" autocomplete="off">`;
      break;
    case 'number':
      input = `<input type="number" id="fld" placeholder="${q.placeholder || ''}" value="${state.answers[q.id] || ''}" min="${q.min||''}" max="${q.max||''}">`;
      break;
    case 'textarea':
      input = `<textarea id="fld" placeholder="${q.placeholder || ''}">${state.answers[q.id] || ''}</textarea><div class="textarea-hint">Shift + Enter for new line</div>`;
      break;
    case 'select':
      input = `<div class="tiles">${q.options.map((opt, i) => {
        const selected = state.answers[q.id] === opt ? 'selected' : '';
        const key = String.fromCharCode(65 + i);
        return `<button class="tile ${selected}" data-value="${opt}" onclick="selectSingle('${q.id}', this)"><span>${opt}</span><span class="tile-key">${key}</span></button>`;
      }).join('')}</div>`;
      break;
    case 'multiselect':
      const current = state.answers[q.id] || [];
      input = `
        <div class="multi-hint">Select all that apply</div>
        <div class="tiles">${q.options.map((opt, i) => {
          const selected = current.includes(opt) ? 'selected' : '';
          const key = String.fromCharCode(65 + i);
          return `<button class="tile ${selected}" data-value="${opt}" onclick="toggleMulti('${q.id}', this)"><span>${opt}</span><span class="tile-key">${key}</span></button>`;
        }).join('')}</div>
      `;
      break;
    case 'weekdays':
      const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const selectedDays = state.answers[q.id] || [];
      input = `<div class="weekday-row">${days.map(d => {
        const sel = selectedDays.includes(d) ? 'selected' : '';
        return `<button class="weekday ${sel}" data-value="${d}" onclick="toggleWeekday('${q.id}', this)">${d}</button>`;
      }).join('')}</div>`;
      break;
    case 'slider':
      const val = state.answers[q.id] ?? q.default;
      if (state.answers[q.id] == null) state.answers[q.id] = q.default;
      input = `
        <div class="slider-wrap">
          <div class="slider-value"><span id="sliderVal">${val}</span><span class="unit">${q.unit || ''}</span></div>
          <input type="range" id="fld" min="${q.min}" max="${q.max}" value="${val}" oninput="document.getElementById('sliderVal').textContent = this.value; state.answers['${q.id}'] = parseInt(this.value);">
          <div class="slider-ticks">
            ${Array.from({length: q.max - q.min + 1}, (_, i) => `<span>${q.min + i}</span>`).join('')}
          </div>
        </div>
      `;
      break;
    case 'lifts':
      const lifts = state.answers[q.id] || {};
      input = `
        <div class="lift-grid">
          ${[
            ['squat', 'Squat — kg × reps'],
            ['bench', 'Bench press — kg × reps'],
            ['deadlift', 'Deadlift — kg × reps'],
            ['ohp', 'Overhead press — kg × reps'],
            ['hipthrust', 'Hip thrust / glute bridge — kg × reps'],
            ['chinup', 'Chin-ups — reps (+kg if added)']
          ].map(([key, lbl]) => `
            <div class="lift-field">
              <label>${lbl}</label>
              <input type="text" data-lift="${key}" value="${lifts[key] || ''}" placeholder="—" oninput="updateLift('${q.id}', this)">
            </div>
          `).join('')}
        </div>
      `;
      break;
    case 'file':
      const files = state.answers[q.id] || [];
      input = `
        <label class="file-drop" for="fldFile">
          <strong>Drop photos here or tap to select</strong>
          ${files.length ? `${files.length} file${files.length>1?'s':''} selected` : 'No files yet'}
        </label>
        <input type="file" id="fldFile" accept="${q.accept || '*'}" ${q.multiple ? 'multiple' : ''} style="display:none" onchange="handleFiles('${q.id}', this)">
        <div class="file-list">
          ${files.map((f, i) => `
            <div class="file-item">
              <span>${f.name} · ${(f.size/1024).toFixed(0)} KB</span>
              <button class="rm" onclick="removeFile('${q.id}', ${i})">Remove</button>
            </div>
          `).join('')}
        </div>
      `;
      break;
  }

  main.innerHTML = `
    <div class="question-wrap" id="qwrap">
      <div class="q-number-bar">
        <span class="q-number">${n} / ${total}</span>
        ${chevronRight('var(--ink-faint)')}
        <span class="q-section">${sectionLabel}</span>
      </div>
      <h2 class="q-label">${q.label}${requiredMark}</h2>
      ${help}
      ${input}
      <div class="controls">
        ${state.step > 0 ? '<button class="btn btn-ghost" onclick="prev()">← Back</button>' : ''}
        <button class="btn btn-primary" onclick="next()" id="nextBtn">${state.step === questions.length - 1 ? 'Submit' : 'Continue'} ${chevronRight('#010101')}<span class="btn-key">Enter</span></button>
        ${!q.required ? '<button class="btn btn-ghost" onclick="skip()">Skip</button>' : ''}
      </div>
      <div class="err-msg" id="errMsg" style="display:none"></div>
    </div>
  `;

  const fld = document.getElementById('fld');
  if (fld) setTimeout(() => fld.focus(), 50);
}

function renderEnd() {
  // Show submitting state first
  renderSubmitting();
  // Fire submission async
  submitToEndpoint().then(success => {
    if (success) renderSuccess();
    else renderError();
  });
}

function renderSubmitting() {
  main.innerHTML = `
    <div class="question-wrap screen-centered">
      <div class="status-pill pending"><span class="status-dot"></span>Sending</div>
      <h1 class="intro-title">One moment...</h1>
      <p class="intro-body">Saving your answers and firing them through.</p>
    </div>
  `;
}

function renderSuccess() {
  const firstName = (state.answers.name || '').split(' ')[0] || 'there';
  main.innerHTML = `
    <div class="question-wrap screen-centered">
      <div class="status-pill success"><span class="status-dot"></span>Received</div>
      <h1 class="intro-title">All set, <span class="accent">${escapeHtml(firstName)}.</span></h1>
      <p class="intro-body">Your answers are in. I'll review everything and get your program built — you'll hear from me within a couple of days.</p>

      <div class="photo-card">
        <div class="photo-card-label">One last thing</div>
        <h3>Photos of your gym.</h3>
        <p>Next time you're at the gym, snap a few quick photos — racks, machines, cables, dumbbell range. The more I can see, the better your program will fit the equipment you actually have. Send them to me:</p>
        <div class="contact-rows">
          <div class="contact-row">
            <span class="contact-label">Email</span>
            <a class="contact-value" href="mailto:${COACH_EMAIL}">${COACH_EMAIL}</a>
          </div>
          <div class="contact-row">
            <span class="contact-label">WhatsApp / Text</span>
            <a class="contact-value" href="sms:${COACH_PHONE.replace(/\s/g,'')}">${COACH_PHONE}</a>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-outline" onclick="restart()">↺ Start Over</button>
      </div>
    </div>
  `;
}

function renderError() {
  const payload = JSON.stringify(state.answers, (k, v) => {
    if (v instanceof File) return { name: v.name, size: v.size, type: v.type };
    return v;
  }, 2);

  main.innerHTML = `
    <div class="question-wrap screen-centered">
      <div class="status-pill error"><span class="status-dot"></span>Couldn't send automatically</div>
      <h1 class="intro-title">Almost <span class="accent">there.</span></h1>
      <p class="intro-body">The auto-send didn't go through — probably a network hiccup or the endpoint isn't live yet. Use one of the options below to get your answers to me, and I'll take it from there.</p>

      <div class="summary-box">
        <pre id="payload">${escapeHtml(payload)}</pre>
      </div>

      <div class="integration-row">
        <button class="btn btn-primary" onclick="emailPayload()">Email to Coach ${chevronRight('#010101')}</button>
        <button class="btn btn-outline" onclick="downloadJSON()">↓ Download JSON</button>
        <button class="btn btn-outline" onclick="copyJSON()">⧉ Copy JSON</button>
        <button class="btn btn-outline" onclick="restart()">↺ Start Over</button>
      </div>
    </div>
  `;
}

async function submitToEndpoint() {
  if (!FORM_ENDPOINT) return false;
  try {
    const payload = JSON.stringify(state.answers);
    await fetch(FORM_ENDPOINT, {
      method: 'POST',
      body: payload,
      // No Content-Type header — avoids CORS preflight for Apps Script
    });
    return true;
  } catch (err) {
    console.error('Submission failed:', err);
    return false;
  }
}

/* ═══════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════ */
function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function selectSingle(qid, btn) {
  state.answers[qid] = btn.dataset.value;
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => next(), 240);
}

function toggleMulti(qid, btn) {
  const arr = state.answers[qid] || [];
  const val = btn.dataset.value;
  const idx = arr.indexOf(val);
  if (idx === -1) arr.push(val); else arr.splice(idx, 1);
  state.answers[qid] = arr;
  btn.classList.toggle('selected');
}

function toggleWeekday(qid, btn) {
  const arr = state.answers[qid] || [];
  const val = btn.dataset.value;
  const idx = arr.indexOf(val);
  if (idx === -1) arr.push(val); else arr.splice(idx, 1);
  state.answers[qid] = arr;
  btn.classList.toggle('selected');
}

function updateLift(qid, input) {
  const current = state.answers[qid] || {};
  current[input.dataset.lift] = input.value;
  state.answers[qid] = current;
}

function handleFiles(qid, input) {
  const existing = state.answers[qid] || [];
  const newFiles = Array.from(input.files);
  state.answers[qid] = [...existing, ...newFiles];
  renderQuestion(questions[state.step]);
}

function removeFile(qid, idx) {
  state.answers[qid].splice(idx, 1);
  renderQuestion(questions[state.step]);
}

function validate() {
  if (state.step < 0 || state.step >= questions.length) return true;
  const q = questions[state.step];
  captureCurrentInput();
  if (!q.required) return true;
  const v = state.answers[q.id];
  if (v === undefined || v === '' || v === null) return showError('This one is required.');
  if (Array.isArray(v) && v.length === 0) return showError('Pick at least one.');
  if (q.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return showError('Email doesn\'t look right.');
  return true;
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  if (el) { el.textContent = msg; el.style.display = 'flex'; }
  return false;
}

function captureCurrentInput() {
  if (state.step < 0 || state.step >= questions.length) return;
  const q = questions[state.step];
  const fld = document.getElementById('fld');
  if (fld && (q.type === 'text' || q.type === 'email' || q.type === 'tel' || q.type === 'number' || q.type === 'textarea')) {
    state.answers[q.id] = fld.value;
  }
}

function next() {
  if (!validate()) return;
  transition(() => { state.step++; render(); });
}

function prev() {
  captureCurrentInput();
  transition(() => { state.step--; render(); });
}

function skip() {
  transition(() => { state.step++; render(); });
}

function transition(cb) {
  const wrap = document.getElementById('qwrap');
  if (wrap) {
    wrap.classList.add('leaving');
    setTimeout(cb, 200);
  } else {
    cb();
  }
}

function render() {
  renderProgress();
  renderSectionMap();
  if (state.step < 0) renderIntro();
  else if (state.step >= questions.length) renderEnd();
  else renderQuestion(questions[state.step]);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const el = document.activeElement;
    // In textarea: Shift+Enter creates a new line, plain Enter continues
    if (el && el.tagName === 'TEXTAREA' && e.shiftKey) return;
    e.preventDefault();
    next();
  }
});

function emailPayload() {
  const subject = encodeURIComponent(`${BRAND_NAME} Program Intake — ${state.answers.name || 'Client'}`);
  const body = encodeURIComponent(JSON.stringify(state.answers, (k, v) => v instanceof File ? { name: v.name, size: v.size } : v, 2));
  window.location.href = `mailto:${COACH_EMAIL}?subject=${subject}&body=${body}`;
}

function downloadJSON() {
  const data = JSON.stringify(state.answers, (k, v) => v instanceof File ? { name: v.name, size: v.size } : v, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lvlup-intake-${(state.answers.name || 'client').replace(/\s+/g,'-').toLowerCase()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  const data = JSON.stringify(state.answers, (k, v) => v instanceof File ? { name: v.name, size: v.size } : v, 2);
  navigator.clipboard.writeText(data).then(() => alert('Copied to clipboard.'));
}

function restart() {
  state.step = -1;
  state.answers = {};
  render();
}

render();
</script>
</body>
</html>
